<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Bridge Academy - Guia de estilo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #F5F6F8;
        --ink: #1F232B;
        --muted: #6B7280;
        --line: #D3D6DC;
        --red: #FF3045;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      header {
        max-width: 1180px;
        margin: 0 auto;
        padding: 36px 24px 18px;
      }
      h1 {
        margin: 0 0 8px;
        font-family: Montserrat, Inter, Arial, sans-serif;
        font-size: 34px;
        line-height: 1.15;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }
      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px 24px 56px;
      }
      figure {
        margin: 0;
        padding: 18px;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 14px 30px rgba(13, 13, 13, 0.10);
      }
      figcaption {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
      }
      a { color: var(--red); text-decoration: none; }
      img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>The Bridge Academy - Guia de estilo v2</h1>
      <p>Pagina unica lista para importar en Figma, con tokens, componentes, estados y ejemplo compuesto.</p>
    </header>
    <main>
      <figure>
        <figcaption>
          <span>Style guide v2</span>
          <a href="./style-guide.svg">Abrir SVG</a>
        </figcaption>
        <img src="./style-guide.svg" alt="Guia de estilo de The Bridge Academy" />
      </figure>
    </main>
  </body>
</html>
