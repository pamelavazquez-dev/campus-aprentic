<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Academy Edition - Demo Figma</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f6f8;
        --ink: #1f232b;
        --muted: #6b7280;
        --line: #d3d6dc;
        --red: #ff3045;
        --dark-red: #b01626;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Montserrat, Inter, Arial, sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      header {
        padding: 40px 48px 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 34px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
      }

      main {
        display: grid;
        gap: 28px;
        padding: 24px 48px 56px;
      }

      figure {
        margin: 0;
        padding: 18px;
        background: #ffffff;
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 14px 30px rgba(13, 13, 13, 0.10);
      }

      figcaption {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
      }

      a {
        color: var(--red);
        text-decoration: none;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Academy Edition - Demo visual avanzada</h1>
      <p>Aprende. Explora. Analiza. Inspira. Galeria local de SVG lista para importar en Figma.</p>
    </header>

    <main>
      <figure>
        <figcaption>
          <span>01 - Flujo avanzado overview</span>
          <a href="./01-flujo-avanzado-overview.svg">Abrir SVG</a>
        </figcaption>
        <img src="./01-flujo-avanzado-overview.svg" alt="Mapa general del flujo avanzado" />
      </figure>

      <figure>
        <figcaption>
          <span>02 - Publico y descubrimiento Academy Edition</span>
          <a href="./02-publico-descubrimiento.svg">Abrir SVG</a>
        </figcaption>
        <img src="./02-publico-descubrimiento.svg" alt="Pantallas publicas de Academy Edition" />
      </figure>

      <figure>
        <figcaption>
          <span>03 - Instructor avanzado</span>
          <a href="./03-instructor-avanzado.svg">Abrir SVG</a>
        </figcaption>
        <img src="./03-instructor-avanzado.svg" alt="Flujo avanzado del instructor" />
      </figure>

      <figure>
        <figcaption>
          <span>04 - Alumno avanzado</span>
          <a href="./04-alumno-avanzado.svg">Abrir SVG</a>
        </figcaption>
        <img src="./04-alumno-avanzado.svg" alt="Flujo avanzado del alumno" />
      </figure>

      <figure>
        <figcaption>
          <span>05 - Mapa de clicks para Figma</span>
          <a href="./05-prototipo-clicks.svg">Abrir SVG</a>
        </figcaption>
        <img src="./05-prototipo-clicks.svg" alt="Mapa de conexiones para prototipo en Figma" />
      </figure>
    </main>
  </body>
</html>
